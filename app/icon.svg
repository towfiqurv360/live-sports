<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient (Blue to Cyan matching your app) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Shield Outline Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2" />
    </linearGradient>
    
    <!-- 3D Glow and Shadow for the Play Button -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- Smooth Rounded App Icon Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- The "Keeper" Shield Symbol -->
  <path d="M 256 90 L 130 140 L 130 280 C 130 380 200 440 256 460 C 312 440 382 380 382 280 L 382 140 Z" 
        fill="none" 
        stroke="url(#shieldGrad)" 
        stroke-width="28" 
        stroke-linejoin="round" />
  
  <!-- The "Stream" Play Button (Rounded Corners) -->
  <path d="M 215 188 C 205 182 192 189 192 201 L 192 311 C 192 323 205 330 215 324 L 315 269 C 325 263 325 249 315 243 Z" 
        fill="#ffffff" 
        filter="url(#glow)" />
</svg>
